<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Shop Coordinates</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #14151a;
    color: #f2f1ec;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    max-width: 420px;
    background: #1d1f26;
    border: 1px solid #2c2f3a;
    border-radius: 14px;
    padding: 28px 24px;
    text-align: center;
  }
  h1 { font-size: 18px; margin-top: 0; }
  p { color: #9a9ca6; font-size: 14px; line-height: 1.5; }
  button {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 10px;
    background: #ff6a1a;
    color: #1a0a02;
    font-size: 16px;
    font-weight: 700;
    margin-top: 12px;
  }
  .result {
    margin-top: 20px;
    padding: 16px;
    background: #0f1014;
    border-radius: 10px;
    text-align: left;
    font-family: monospace;
    font-size: 14px;
    display: none;
    word-break: break-all;
  }
  .result.show { display: block; }
  .copy-line { margin: 6px 0; }
  .label { color: #9a9ca6; }
</style>
</head>
<body>
<div class="card">
  <h1>Step 1: Stand inside the shop</h1>
  <p>Stand near the center of the shop floor (away from the very front glass or back wall for the best reading), then tap the button below.</p>
  <button onclick="getLocation()">Get My Exact Coordinates</button>
  <div class="result" id="result"></div>
</div>

<script>
function getLocation() {
  const result = document.getElementById('result');
  result.className = 'result show';
  result.textContent = 'Getting location… this can take a few seconds for best accuracy.';

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude.toFixed(6);
      const lng = pos.coords.longitude.toFixed(6);
      const acc = Math.round(pos.coords.accuracy);
      result.innerHTML =
        '<div class="copy-line"><span class="label">SHOP_LAT:</span> ' + lat + '</div>' +
        '<div class="copy-line"><span class="label">SHOP_LNG:</span> ' + lng + '</div>' +
        '<div class="copy-line"><span class="label">Accuracy:</span> ±' + acc + ' meters</div>' +
        '<div style="margin-top:12px; color:#9a9ca6; font-family:-apple-system,sans-serif; font-size:13px;">Copy these two numbers into the CONFIG section at the top of Code.gs in Apps Script, replacing SHOP_LAT and SHOP_LNG.</div>';
    },
    (err) => {
      result.textContent = 'Error: ' + err.message + '. Make sure location is enabled for this page.';
    },
    { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
  );
}
</script>
</body>
</html>
